<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Oheneba Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, var(--bg-main) 0%, #e0f2fe 100%);
            position: relative;
        }
        
        .auth-card {
            width: 100%;
            max-width: 450px;
            background: white;
            padding: 3rem 2.5rem;
            border-radius: var(--border-radius-lg);
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            position: relative;
            z-index: 2;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .auth-header h2 {
            color: var(--primary);
            font-size: 2rem;
            margin-top: 1rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
        }
        
        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #E2E8F0;
            border-radius: var(--border-radius-sm);
            font-family: var(--font-body);
            font-size: 1rem;
            transition: var(--transition);
        }
        
        .form-control:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(0, 210, 255, 0.1);
        }
        
        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.95rem;
            color: var(--text-muted);
        }
        
        .auth-footer a {
            color: var(--secondary);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="bg-blob blob-1" style="top: 10%; left: 10%;"></div>
        <div class="bg-blob blob-2" style="bottom: 10%; right: 10%;"></div>
        
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="brand-logo" style="justify-content: center;">
                    <i class="fa-solid fa-heart-pulse"></i>
                    Oheneba<span>Center</span>
                </a>
                <h2>Welcome Back</h2>
                <p class="text-muted">Log in to manage your appointments.</p>
            </div>
            
            <form id="loginForm" action="dashboard.html" method="GET">
                <div class="form-group">
                    <label for="email">Email or Phone Number</label>
                    <input type="text" id="email" class="form-control" placeholder="Enter your email or phone" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; cursor: pointer;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="font-size: 0.9rem; color: var(--text-muted);">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary w-100">Log In</button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </div>
</body>
</html>
