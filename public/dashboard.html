<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard - Oheneba Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #F1F5F9;
        }
        
        .dashboard-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }
        
        .sidebar {
            background: white;
            border-right: 1px solid #E2E8F0;
            padding: 2rem 1.5rem;
            position: fixed;
            height: 100vh;
            width: 260px;
        }
        
        .sidebar-menu {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .sidebar-item {
            padding: 12px 16px;
            border-radius: var(--border-radius-sm);
            color: var(--text-muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
        }
        
        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(0, 210, 255, 0.1);
            color: var(--primary);
        }
        
        .sidebar-item i {
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }
        
        .main-content {
            margin-left: 260px;
            padding: 2rem 3rem;
        }
        
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }
        
        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.2rem;
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }
        
        .panel {
            background: white;
            border-radius: var(--border-radius-md);
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.04);
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .panel-header h3 {
            color: var(--primary);
            font-size: 1.3rem;
        }
        
        .appointment-card {
            border: 1px solid #E2E8F0;
            border-radius: var(--border-radius-sm);
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            transition: var(--transition);
        }
        
        .appointment-card:hover {
            border-color: var(--secondary);
            box-shadow: 0 4px 12px rgba(0, 210, 255, 0.1);
        }
        
        .apt-date {
            background: #F8FAFC;
            padding: 10px;
            border-radius: var(--border-radius-sm);
            text-align: center;
            min-width: 70px;
        }
        
        .apt-date span {
            display: block;
            color: var(--primary);
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        .apt-date small {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .apt-info h4 {
            color: var(--primary);
            margin-bottom: 4px;
        }
        
        .apt-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        .action-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .action-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 1rem;
            background: #F8FAFC;
            border-radius: var(--border-radius-sm);
            color: var(--primary);
            font-weight: 500;
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .action-btn i {
            color: var(--secondary);
            font-size: 1.2rem;
        }
        
        .action-btn:hover {
            background: white;
            border-color: var(--secondary);
            box-shadow: 0 4px 12px rgba(0, 210, 255, 0.1);
        }
        
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="index.html" class="brand-logo">
                <i class="fa-solid fa-heart-pulse"></i>
                Oheneba
            </a>
            
            <nav class="sidebar-menu">
                <a href="#" class="sidebar-item active">
                    <i class="fa-solid fa-house"></i> Overview
                </a>
                <a href="#" class="sidebar-item">
                    <i class="fa-solid fa-calendar-check"></i> Appointments
                </a>
                <a href="#" class="sidebar-item">
                    <i class="fa-solid fa-file-medical"></i> Medical Records
                </a>
                <a href="#" class="sidebar-item">
                    <i class="fa-solid fa-credit-card"></i> Payments
                </a>
                <a href="#" class="sidebar-item">
                    <i class="fa-solid fa-gear"></i> Settings
                </a>
            </nav>
            
            <div style="position: absolute; bottom: 2rem; width: calc(100% - 3rem);">
                <a href="index.html" class="sidebar-item" style="color: #EF4444;">
                    <i class="fa-solid fa-right-from-bracket"></i> Log Out
                </a>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div>
                    <h1 style="color: var(--primary); font-size: 2rem;">Welcome, John!</h1>
                    <p class="text-muted">Here's your health overview for today.</p>
                </div>
                
                <div class="user-profile">
                    <div style="text-align: right;">
                        <span style="display: block; font-weight: 600; color: var(--primary);">John Doe</span>
                        <span style="font-size: 0.85rem; color: var(--text-muted);">Patient</span>
                    </div>
                    <div class="user-avatar">JD</div>
                </div>
            </header>
            
            <div class="dashboard-grid">
                <!-- Left Column -->
                <div>
                    <div class="panel mb-4">
                        <div class="panel-header">
                            <h3>Upcoming Appointments</h3>
                            <a href="#" style="color: var(--secondary); font-size: 0.9rem; font-weight: 500;">View All</a>
                        </div>
                        <div id="appointmentsList">
                            <!-- Dynamically loaded appointments will appear here -->
                        </div>
                    </div>
                </div>
                
                <!-- Right Column -->
                <div>
                    <div class="panel">
                        <div class="panel-header">
                            <h3>Quick Actions</h3>
                        </div>
                        <div class="action-list">
                            <div class="action-btn">
                                <i class="fa-solid fa-plus-circle"></i>
                                <span>Book New Appointment</span>
                            </div>
                            <div class="action-btn">
                                <i class="fa-solid fa-prescription-bottle-medical"></i>
                                <span>Request Prescription Refill</span>
                            </div>
                            <div class="action-btn">
                                <i class="fa-solid fa-comment-medical"></i>
                                <span>Message Your Doctor</span>
                            </div>
                            <div class="action-btn">
                                <i class="fa-solid fa-file-invoice-dollar"></i>
                                <span>Make a Payment (MoMo/Card)</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Socket.io and App Scripts -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
